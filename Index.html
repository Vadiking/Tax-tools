<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tax Dashboard - Vadiraj</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pure: #000000;
            --card-bg: #111111;
            --accent-green: #00ff88; 
            --accent-blue: #00a2ff;  
            --text-high: #ffffff;
            --text-low: #888888;
            --deadline-red: #ff3333;
            --border-color: #222222;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-pure); color: var(--text-high); display: flex; overflow-x: hidden; }

        .sidebar { width: 260px; background: var(--bg-pure); height: 100vh; position: fixed; border-right: 1px solid var(--border-color); z-index: 100; }
        .profile-area { padding: 50px 30px; border-bottom: 1px solid var(--border-color); }
        .profile-area h2 { margin: 0; font-size: 1.2rem; color: var(--text-high); }
        .profile-area p { font-size: 0.75rem; color: var(--text-low); margin-top: 5px; }

        .nav-item { padding: 18px 30px; cursor: pointer; transition: 0.3s; color: var(--text-low); font-size: 0.9rem; }
        .nav-item:hover { color: var(--text-high); background: #0a0a0a; }

        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); position: relative; }
        header { margin-bottom: 30px; }

        .calendar-nav { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .arrow { background: transparent; border: 1px solid var(--border-color); color: #fff; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }

        .dashboard-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 25px; position: relative; }
        .calendar-card, .deadline-card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border-color); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .day { aspect-ratio: 1; border-radius: 10px; background: #181818; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; }
        .day.highlight { border: 1px solid var(--accent-green); color: var(--accent-green); cursor: pointer; font-weight: bold; }

        .deadline-item { padding: 15px; margin-bottom: 10px; background: #0a0a0a; border-radius: 12px; border-left: 3px solid var(--accent-green); }
        .active-deadline { border-left-color: var(--deadline-red); background: #1a0505; }

        #connector-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .connection-line { fill: none; stroke: var(--deadline-red); stroke-width: 2; stroke-dasharray: 4; animation: dash 1s linear infinite; }
        @keyframes dash { from { stroke-dashoffset: 8; } to { stroke-dashoffset: 0; } }

        #tools { margin-top: 60px; }
        .tools-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .tool-link { background: var(--card-bg); padding: 25px; border-radius: 15px; text-align: center; text-decoration: none; color: #fff; border: 1px solid var(--border-color); transition: 0.3s; }
        .tool-link:hover { border-color: var(--accent-blue); transform: translateY(-5px); }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile-area"><h2>Vadiraj</h2><p>Tax Workspace</p></div>
    <div class="nav-item" onclick="window.scrollTo(0,0)">Dashboard</div>
    <div class="nav-item" onclick="document.getElementById('tools').scrollIntoView()">Tools</div>
</div>

<div class="main">
    <svg id="connector-canvas"></svg>
    <header><h1>Compliance Status</h1></header>

    <div class="calendar-nav">
        <button class="arrow" onclick="changeMonth(-1)">&#10094;</button>
        <h3 id="monthDisplay" style="margin:0; width:200px; text-align:center;">March 2026</h3>
        <button class="arrow" onclick="changeMonth(1)">&#10095;</button>
    </div>

    <div class="dashboard-grid">
        <div class="calendar-card"><div class="calendar-grid" id="calendarGrid"></div></div>
        <div class="deadline-card" id="deadlineList"></div>
    </div>

    <section id="tools">
        <h3 style="color: var(--text-low); margin-bottom: 20px;">SYSTEM TOOLS</h3>
        <div class="tools-container">
            <a class="tool-link" href="file-diff.html">File Diff</a>
            <a class="tool-link" href="converter26as.html">26AS Converter</a>
            <a class="tool-link" href="challan.html">Challan Tool</a>
            <a class="tool-link" href="pdf-renamer.html">PDF Renamer</a>
            <a class="tool-link" href="tds-tool.html">TDS Tool</a>
        </div>
    </section>
</div>

<script>
    let currentMonth = 2; 
    let currentYear = 2026;
    const taxRegistry = {
        2: [{ d: 7, l: "TDS Payment" }, { d: 11, l: "GSTR-1" }, { d: 15, l: "Advance Tax" }, { d: 20, l: "GSTR-3B" }],
        3: [{ d: 11, l: "GSTR-1" }, { d: 20, l: "GSTR-3B" }, { d: 30, l: "TDS Payment (March)" }],
        4: [{ d: 7, l: "TDS Payment" }, { d: 31, l: "TDS Filing" }]
    };

    function build() {
        const grid = document.getElementById('calendarGrid');
        const list = document.getElementById('deadlineList');
        const date = new Date(currentYear, currentMonth, 1);
        document.getElementById('monthDisplay').innerText = date.toLocaleString('default', { month: 'long', year: 'numeric' });
        
        grid.innerHTML = '<div style="font-size:0.7rem; color:#444">S</div><div style="font-size:0.7rem; color:#444">M</div><div style="font-size:0.7rem; color:#444">T</div><div style="font-size:0.7rem; color:#444">W</div><div style="font-size:0.7rem; color:#444">T</div><div style="font-size:0.7rem; color:#444">F</div><div style="font-size:0.7rem; color:#444">S</div>';
        
        const monthItems = taxRegistry[currentMonth] || [];
        list.innerHTML = `<h4 style="margin-top:0; color:var(--accent-green)">Checklist</h4>`;
        monthItems.forEach(i => list.innerHTML += `<div class="deadline-item" id="item-${i.d}"><strong>${i.l}</strong><br><small style="color:var(--text-low)">Due: ${i.d}</small></div>`);

        const start = new Date(currentYear, currentMonth, 1).getDay();
        const len = new Date(currentYear, currentMonth + 1, 0).getDate();
        for(let i=0; i<start; i++) grid.innerHTML += '<div></div>';
        for(let d=1; d<=len; d++) {
            const isH = monthItems.some(i => i.d === d);
            grid.innerHTML += `<div class="day ${isH ? 'highlight' : ''}" ${isH ? `id="date-${d}" onclick="link(${d})"` : ''}>${d}</div>`;
        }
        document.getElementById('connector-canvas').innerHTML = '';
    }

    function changeMonth(n) { currentMonth += n; build(); }
    function link(d) {
        const svg = document.getElementById('connector-canvas');
        const sR = document.getElementById(`date-${d}`).getBoundingClientRect();
        const eR = document.getElementById(`item-${d}`).getBoundingClientRect();
        const m = document.querySelector('.main').getBoundingClientRect();
        document.querySelectorAll('.deadline-item').forEach(el => el.classList.remove('active-deadline'));
        document.getElementById(`item-${d}`).classList.add('active-deadline');
        svg.innerHTML = `<path d="M ${sR.left + sR.width/2 - m.left} ${sR.top + sR.height/2 - m.top} C ${sR.left + 200 - m.left} ${sR.top - m.top}, ${eR.left - 100 - m.left} ${eR.top - m.top}, ${eR.left - m.left} ${eR.top + eR.height/2 - m.top}" class="connection-line" />`;
    }
    build();
</script>
</body>
</html>
