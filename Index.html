<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Tax Dashboard - Vadiraj</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pure: #000000;
            --card-bg: #111111;
            --accent-green: #00ff88; 
            --accent-blue: #00a2ff;  
            --text-high: #ffffff;
            --text-low: #888888;
            --deadline-red: #ff3333;
            --border-color: #222222;
        }

        * { box-sizing: border-box; scroll-behavior: smooth; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-pure); color: var(--text-high); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Styling */
        .sidebar { width: 260px; background: var(--bg-pure); height: 100vh; position: fixed; border-right: 1px solid var(--border-color); z-index: 100; transition: 0.3s; }
        .profile-area { padding: 40px 30px; border-bottom: 1px solid var(--border-color); }
        .profile-area h2 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; color: var(--text-high); }
        .profile-area p { font-size: 0.75rem; color: var(--text-low); margin-top: 5px; }

        .nav-links { display: flex; flex-direction: column; }
        .nav-item { padding: 15px 30px; cursor: pointer; transition: 0.3s; color: var(--text-low); font-size: 0.9rem; }
        .nav-item:hover { color: var(--text-high); background: #0a0a0a; }

        /* Main Content Layout */
        .main { margin-left: 260px; padding: 20px 30px; width: calc(100% - 260px); height: 100vh; position: relative; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; transition: 0.3s; }

        header h1 { font-size: 1.8rem; margin: 0; color: var(--text-high); }
        header p { color: var(--text-low); margin-top: 5px; font-size: 0.85rem; }

        .header-actions { display: flex; align-items: center; gap: 12px; }
        .gst-map-btn { 
            background: #0a0a0a; border: 1px solid var(--border-color); padding: 13px 20px; border-radius: 12px; 
            color: var(--accent-blue); font-size: 0.9rem; font-weight: 600; text-decoration: none; 
            display: flex; align-items: center; gap: 8px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); 
        }
        .gst-map-btn:hover { border-color: var(--accent-blue); background: #111; color: var(--text-high); }

        .search-container { position: relative; width: 100%; max-width: 380px; z-index: 50; }
        .search-container input { width: 100%; background: #0a0a0a; border: 1px solid var(--border-color); padding: 14px 20px 14px 45px; border-radius: 12px; color: var(--text-high); font-size: 0.95rem; transition: 0.3s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-low); font-size: 1.1rem; pointer-events: none; }
        
        .search-results { position: absolute; top: calc(100% + 10px); left: 0; right: 0; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); max-height: 350px; overflow-y: auto; display: none; flex-direction: column; padding: 10px; }
        .search-results.active { display: flex; }

        /* Dashboard Grid */
        .dashboard-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; flex: 1; min-height: 0; position: relative; margin-top: 20px; }
        .calendar-card, .deadline-card { background: var(--card-bg); border-radius: 20px; padding: 15px 20px; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .day { border-radius: 8px; background: #181818; font-size: 0.85rem; height: 40px; display: flex; align-items: center; justify-content: center; }
        .day.highlight { border: 1px solid var(--accent-green); color: var(--accent-green); cursor: pointer; }

        #tools { margin-top: 15px; flex-shrink: 0; padding-bottom: 30px; }
        .bucket-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        .bucket-btn { background: var(--card-bg); border: 1px solid var(--border-color); padding: 15px; border-radius: 16px; color: var(--text-high); font-size: 1rem; cursor: pointer; transition: 0.3s; font-weight: 600; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .bucket-btn:hover { border-color: var(--accent-blue); transform: translateY(-3px); }
        .bucket-btn.interview-btn { border-color: var(--accent-green); color: var(--accent-green); }

        /* --- MOBILE RESPONSIVENESS UPDATES --- */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            
            /* Sidebar becomes top profile/nav bar */
            .sidebar { 
                width: 100%; height: auto; position: relative; 
                border-right: none; border-bottom: 1px solid var(--border-color); 
            }
            .profile-area { padding: 20px; text-align: center; }
            .nav-links { flex-direction: row; flex-wrap: wrap; justify-content: center; }
            .nav-item { padding: 10px 15px; font-size: 0.8rem; }

            /* Main content takes full width */
            .main { margin-left: 0; width: 100%; height: auto; overflow: visible; padding: 20px 15px; }
            
            header { flex-direction: column; align-items: flex-start !important; gap: 15px; }
            .header-actions { width: 100%; flex-direction: column; align-items: stretch; }
            .gst-map-btn { justify-content: center; }
            .search-container { max-width: 100%; }

            /* Grid stacks to one column */
            .dashboard-grid { grid-template-columns: 1fr; margin-top: 10px; }
            .bucket-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            
            .interview-content { padding: 20px; width: 95%; }
            .q-text { font-size: 1.1rem; }
            .cat-selector { flex-wrap: wrap; justify-content: center; }
        }

        /* Modal Base */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; backdrop-filter: blur(10px); justify-content: center; align-items: center; padding: 20px; }
        .interview-content { background: #0a0a0a; width: 100%; max-width: 800px; border-radius: 24px; border: 1px solid var(--border-color); padding: 40px; position: relative; box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
        .cat-selector { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .cat-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-low); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
        .cat-btn.active { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(0, 162, 255, 0.1); }
        
        .q-area { min-height: 100px; margin-bottom: 20px; }
        .q-text { font-size: 1.4rem; color: #fff; line-height: 1.4; font-weight: 500; }
        .a-area { background: #111; border: 1px solid #333; border-radius: 12px; padding: 20px; margin-top: 20px; display: none; }
        .a-area p { color: var(--accent-green); font-size: 0.95rem; line-height: 1.6; margin: 0; }
        
        .interview-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; gap: 10px; }
        .reveal-btn, .next-btn { padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.85rem; }
        .reveal-btn { background: var(--accent-blue); color: #000; border: none; }
        .next-btn { background: transparent; border: 1px solid var(--accent-green); color: var(--accent-green); }
        
        .close-x { position: absolute; top: 20px; right: 25px; color: var(--text-low); font-size: 2rem; cursor: pointer; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="profile-area">
        <h2>Vadiraj</h2>
        <p>Professional Tax Workspace</p>
    </div>
    <div class="nav-links">
        <div class="nav-item" onclick="window.scrollTo(0,0)">Dashboard</div>
        <div class="nav-item" onclick="document.getElementById('tools').scrollIntoView()">Utilities</div>
        <div class="nav-item" onclick="openAbout()">About Me</div>
    </div>
</div>

<div class="main">
    <header style="display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 15px;">
        <div>
            <h1>Tax Management Portal</h1>
            <p>Welcome back. Practice for your next interview or review compliance.</p>
        </div>
        
        <div class="header-actions">
            <a href="GST_MAP_Work.html" class="gst-map-btn"><span>📍</span> GST Codes</a>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="toolSearchInput" placeholder="Search tools..." oninput="handleSearch()">
                <div id="searchResults" class="search-results"></div>
            </div>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="calendar-card"><div class="calendar-grid" id="calendarGrid"></div></div>
        <div class="deadline-card" id="deadlineList"></div>
    </div>

    <section id="tools">
        <h3 style="color: var(--text-low); margin-bottom: 12px; font-size: 0.85rem; letter-spacing: 1px;">WORKFLOW UTILITIES</h3>
        <div class="bucket-grid">
            <button class="bucket-btn" onclick="openToolsWindow('direct-tax', 'Direct Tax Utilities')">Direct Tax</button>
            <button class="bucket-btn" onclick="comingSoon(this, 'Indirect Tax')">Indirect Tax</button>
            <button class="bucket-btn" onclick="comingSoon(this, 'Finance')">Finance</button>
            <button class="bucket-btn" onclick="openToolsWindow('others', 'Other Utilities')">Others</button>
            <button class="bucket-btn interview-btn" onclick="openInterview()">Interview Prep 🎓</button>
        </div>
    </section>
</div>

<div id="interviewModal" class="modal">
    <div class="interview-content">
        <span class="close-x" onclick="closeInterview()">&times;</span>
        <div class="cat-selector">
            <button class="cat-btn active" onclick="setInterviewCat('gst')">GST</button>
            <button class="cat-btn" onclick="setInterviewCat('it')">Income Tax</button>
            <button class="cat-btn" onclick="setInterviewCat('fin')">Finance</button>
        </div>
        
        <p id="qCounter" style="color: var(--text-low); font-size: 0.75rem; margin-bottom: 10px;"></p>
        
        <div class="q-area">
            <div class="q-text" id="qDisplay">Click a category to start.</div>
        </div>
        
        <div class="a-area" id="aDisplay">
            <p id="aText"></p>
        </div>
        
        <div class="interview-footer">
            <button class="reveal-btn" onclick="revealAnswer()">Reveal Answer</button>
            <button class="next-btn" onclick="nextQuestion()">Next ⮕</button>
        </div>
    </div>
</div>

<script>
    // --- INTERVIEW DATA STORAGE ---
    const interviewData = {
        gst: [
            { q: "What is Input Tax Credit (ITC)?", a: "ITC allows businesses to claim credit for GST paid on purchases against their GST liability on sales." },
            { q: "What are the four main types of GST in India?", a: "CGST, SGST, IGST, and UTGST." }
        ],
        it: [
            { q: "What is the meaning of TDS?", a: "Tax Deducted at Source (TDS) is a method of collecting income tax at the time the income is generated." }
        ],
        fin: [
            { q: "Explain Transfer Pricing.", a: "The value at which goods/services are transferred between related entities in different tax jurisdictions." }
        ]
    };

    let currentCat = 'gst';
    let currentIdx = 0;

    function openInterview() { document.getElementById('interviewModal').style.display = 'flex'; loadQuestion(); }
    function closeInterview() { document.getElementById('interviewModal').style.display = 'none'; }

    function setInterviewCat(cat) {
        currentCat = cat; currentIdx = 0;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.toggle('active', btn.textContent.toLowerCase().includes(cat)));
        loadQuestion();
    }

    function loadQuestion() {
        const pool = interviewData[currentCat]; const q = pool[currentIdx];
        document.getElementById('qDisplay').innerText = q.q;
        document.getElementById('aDisplay').style.display = 'none';
        document.getElementById('qCounter').innerText = `Question ${currentIdx + 1} of ${pool.length}`;
    }

    function revealAnswer() {
        document.getElementById('aText').innerText = interviewData[currentCat][currentIdx].a;
        document.getElementById('aDisplay').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx = (currentIdx + 1) % interviewData[currentCat].length;
        loadQuestion();
    }

    function handleSearch() { /* ... existing search logic ... */ }
    function openAbout() { /* ... existing about logic ... */ }
</script>
</body>
</html>
